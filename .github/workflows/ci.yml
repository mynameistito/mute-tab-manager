name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:

jobs:
  check:
    name: Lint, Type Check & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint & format check
        run: bun run check

      - name: Type check
        run: bun x tsc --noEmit

      - name: Build
        run: bun run build
