name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      WXT_CHROME_KEY: ${{ secrets.WXT_CHROME_KEY }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Restore signing key from secret
        if: ${{ env.WXT_CHROME_KEY != '' }}
        run: |
          printf '%s' "$WXT_CHROME_KEY" > key.pem
          chmod 600 key.pem

      - name: Verify signing key exists
        if: ${{ env.WXT_CHROME_KEY != '' }}
        run: |
          if [ ! -f key.pem ]; then
            echo "ERROR: WXT_CHROME_KEY secret is required for release" >&2
            exit 1
          fi

      - name: Create Release Pull Request or Publish
        uses: changesets/action@d94a5c301145045a0960133674e003b265942a22
        with:
          publish: bun run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
