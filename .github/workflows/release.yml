name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      EXTENSION_KEY_PEM: ${{ secrets.EXTENSION_KEY_PEM }}
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Restore signing key from secret
        if: ${{ env.EXTENSION_KEY_PEM != '' }}
        run: |
          printf '%s' "$EXTENSION_KEY_PEM" > key.pem
          chmod 600 key.pem

      

      - name: Verify signing key exists
        if: ${{ env.EXTENSION_KEY_PEM != '' }}
        run: |
          if [ ! -f key.pem ]; then
            echo "ERROR: EXTENSION_KEY_PEM secret is required for release" >&2
            exit 1
          fi

      - name: Create Release Pull Request or Publish
        uses: changesets/action@3841a0683d3cfa6dae0f9bb335290003010fe3f0 # v1.9.0
        with:
          publish: bun run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
