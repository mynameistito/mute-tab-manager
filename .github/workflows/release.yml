name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Restore signing key from secret
        if: ${{ secrets.EXTENSION_KEY_PEM != '' }}
        env:
          EXTENSION_KEY_PEM: ${{ secrets.EXTENSION_KEY_PEM }}
        run: |
          printf '%s' "$EXTENSION_KEY_PEM" > key.pem
          chmod 600 key.pem

      

      - name: Verify signing key exists
        run: |
          if [ ! -f key.pem ]; then
            echo "ERROR: EXTENSION_KEY_PEM secret is required for release" >&2
            exit 1
          fi

      - name: Create Release Pull Request or Publish
        uses: changesets/action@v1
        with:
          publish: bun run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
