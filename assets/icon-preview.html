<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1024">
    <title>Mute Tab Manager — Icon</title>
    <style>
    *, *::before, *::after {
      box-sizing: border-box;
      padding: 0;
      margin: 0;
    }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --red: #e53e3e;
      --green: #38a169;
    }

    html, body {
      width: 1024px;
      height: 1024px;
      overflow: hidden;
      background: var(--bg);
    }

    .canvas {
      position: relative;
      width: 1024px;
      height: 1024px;
      background-color: var(--bg);
      background-image: radial-gradient(circle, #1e2530 1.5px, transparent 1.5px);
      background-size: 32px 32px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-card {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 720px;
      height: 720px;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 160px;
      box-shadow:
        inset 0 0 0 2px rgba(229, 62, 62, 0.2),
        0 0 120px rgba(229, 62, 62, 0.15),
        0 0 60px rgba(229, 62, 62, 0.08);
    }

    .icon-card svg {
      width: 480px;
      height: 480px;
    }

    /* accent gradient ring */
    .ring {
      position: absolute;
      width: 760px;
      height: 760px;
      border-radius: 180px;
      background: transparent;
      border: 2px solid transparent;
      background-clip: padding-box;
      box-shadow:
        0 0 0 1px rgba(229, 62, 62, 0.08),
        0 0 80px rgba(56, 161, 105, 0.05);
    }
    </style>
  </head>
  <body>
    <div class="canvas">
      <div class="ring"></div>
      <div class="icon-card">
        <svg
          width="480"
          height="480"

          xmlns="http://www.w3.org/2000/svg"
        >

</html>
